name: Update Plugin Registry

on:
  # 临时禁用自动更新，避免手动修改 registry.json 被覆盖
  # push:
  #   branches: [main]
  #   paths:
  #     - 'plugins/**'
  #     - 'scripts/generate_registry.py'
  #     - '.github/workflows/update-registry.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate registry.json
        run: python3 scripts/generate_registry.py
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          GITHUB_BRANCH: ${{ github.ref_name }}

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet registry.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push registry.json
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json
          git commit -m "chore: auto-update registry.json [skip ci]"
          git push
